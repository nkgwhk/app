<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シンプルダンジョンゲーム</title>
<style>
body {
    font-family: sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
}

#game {
    margin-top: 30px;
}

.bar {
    width: 300px;
    height: 20px;
    background: #444;
    margin: 10px auto;
    border-radius: 10px;
    overflow: hidden;
}

.hp {
    height: 100%;
    background: #4caf50;
}

.enemy-hp {
    background: #f44336;
}

button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
}

#log {
    height: 120px;
    overflow-y: auto;
    border: 1px solid #555;
    padding: 10px;
    margin-top: 10px;
}
</style>
</head>
<body>

<h1>🗡️ ダンジョンアタック</h1>

<div id="game">

    <p>階層: <span id="floor">1</span></p>

    <h2>プレイヤー</h2>
    <p>HP: <span id="playerHpText"></span></p>
    <div class="bar"><div id="playerHpBar" class="hp"></div></div>

    <h2>敵</h2>
    <p id="enemyName"></p>
    <p>HP: <span id="enemyHpText"></span></p>
    <div class="bar"><div id="enemyHpBar" class="hp enemy-hp"></div></div>

    <button onclick="attack()">攻撃</button>
    <button onclick="heal()">回復</button>

    <div id="log"></div>

</div>

<script>
let player = {
    maxHp: 100,
    hp: 100,
    atk: 10,
    level: 1
};

let enemy = {};
let floor = 1;

function createEnemy() {
    enemy = {
        name: "モンスター Lv." + floor,
        maxHp: 50 + floor * 20,
        hp: 50 + floor * 20,
        atk: 5 + floor * 3
    };
}

function updateUI() {
    document.getElementById("floor").textContent = floor;

    document.getElementById("playerHpText").textContent = player.hp + "/" + player.maxHp;
    document.getElementById("enemyHpText").textContent = enemy.hp + "/" + enemy.maxHp;

    document.getElementById("enemyName").textContent = enemy.name;

    document.getElementById("playerHpBar").style.width = (player.hp / player.maxHp * 100) + "%";
    document.getElementById("enemyHpBar").style.width = (enemy.hp / enemy.maxHp * 100) + "%";
}

function log(text) {
    let logDiv = document.getElementById("log");
    logDiv.innerHTML += text + "<br>";
    logDiv.scrollTop = logDiv.scrollHeight;
}

function attack() {
    let damage = Math.floor(Math.random() * player.atk) + 5;
    enemy.hp -= damage;
    log("あなたの攻撃！ " + damage + " ダメージ");

    if (enemy.hp <= 0) {
        log("敵を倒した！");
        nextFloor();
        return;
    }

    enemyAttack();
    updateUI();
}

function enemyAttack() {
    let damage = Math.floor(Math.random() * enemy.atk);
    player.hp -= damage;
    log("敵の攻撃！ " + damage + " ダメージ");

    if (player.hp <= 0) {
        gameOver();
    }
}

function heal() {
    let amount = 20;
    player.hp += amount;
    if (player.hp > player.maxHp) player.hp = player.maxHp;
    log("回復した！ +" + amount);

    enemyAttack();
    updateUI();
}

function nextFloor() {
    floor++;

    player.level++;
    player.maxHp += 10;
    player.hp = player.maxHp;
    player.atk += 2;

    log("レベルアップ！");

    createEnemy();
    updateUI();
}

function gameOver() {
    alert("ゲームオーバー！");
    location.reload();
}

// 初期化
createEnemy();
updateUI();
</script>

</body>
</html>
