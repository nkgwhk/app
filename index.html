<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3Dダンジョンゲーム</title>
<style>
body { margin: 0; overflow: hidden; }
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: sans-serif;
}
</style>
</head>
<body>

<div id="ui">
    HP: <span id="hp">100</span><br>
    倒した数: <span id="score">0</span><br>
    操作: WASD移動 / マウス視点 / クリック攻撃
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// プレイヤー
let player = {
    hp: 100,
    speed: 0.1
};

// 床
let floorGeo = new THREE.PlaneGeometry(50, 50);
let floorMat = new THREE.MeshBasicMaterial({ color: 0x444444, side: THREE.DoubleSide });
let floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = Math.PI / 2;
scene.add(floor);

// 敵
let enemy;
let enemyHp = 30;
let score = 0;

function spawnEnemy() {
    let geo = new THREE.BoxGeometry(1,1,1);
    let mat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    enemy = new THREE.Mesh(geo, mat);
    enemy.position.set((Math.random()-0.5)*20, 0.5, (Math.random()-0.5)*20);
    scene.add(enemy);
    enemyHp = 30 + score * 5;
}

spawnEnemy();

// カメラ初期位置
camera.position.y = 1.8;

// 入力
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// マウス視点
let yaw = 0;
let pitch = 0;

document.body.addEventListener("click", () => {
    document.body.requestPointerLock();
});

document.addEventListener("mousemove", e => {
    if (document.pointerLockElement === document.body) {
        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
        pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
    }
});

// 攻撃
document.addEventListener("mousedown", () => {
    if (!enemy) return;

    let dist = camera.position.distanceTo(enemy.position);
    if (dist < 2) {
        enemyHp -= 10;

        if (enemyHp <= 0) {
            scene.remove(enemy);
            score++;
            document.getElementById("score").textContent = score;
            spawnEnemy();
        }
    }
});

// 更新
function update() {
    let dir = new THREE.Vector3();

    if (keys["w"]) dir.z -= 1;
    if (keys["s"]) dir.z += 1;
    if (keys["a"]) dir.x -= 1;
    if (keys["d"]) dir.x += 1;

    dir.normalize();

    let forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
    let right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0,1,0));

    camera.position.add(forward.clone().multiplyScalar(-dir.z * player.speed));
    camera.position.add(right.clone().multiplyScalar(dir.x * player.speed));

    // 向き
    camera.rotation.order = "YXZ";
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    // 敵がプレイヤーに向かう
    if (enemy) {
        let direction = new THREE.Vector3().subVectors(camera.position, enemy.position).normalize();
        enemy.position.add(direction.multiplyScalar(0.02));

        let dist = camera.position.distanceTo(enemy.position);
        if (dist < 1.5) {
            player.hp -= 0.2;
            document.getElementById("hp").textContent = Math.floor(player.hp);

            if (player.hp <= 0) {
                alert("ゲームオーバー");
                location.reload();
            }
        }
    }
}

// ループ
function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}
animate();

// リサイズ
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
